<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Tycoon — Signal Engine</title>
<style>
:root{--bg:#050a0f;--card:#0d1520;--border:#1a2535;--green:#10b981;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--text:#f1f5f9;--muted:#64748b;--font:'SF Pro Display','Segoe UI',system-ui,sans-serif;--mono:'SF Mono','Cascadia Code','JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{width:100%;max-width:640px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 4px}
.logo{font-size:1rem;font-weight:600;letter-spacing:-.5px}
.logo span{color:var(--green)}
.time{font-size:.7rem;color:var(--muted);font-family:var(--mono)}
.regime-bar{padding:14px 20px;border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-size:.8rem}
.regime-bar.fear{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}
.regime-bar.greed{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25)}
.regime-bar.calm{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25)}
.regime-bar.chaos{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.25)}
.regime-word{font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.regime-bar.fear .regime-word{color:var(--red)}
.regime-bar.greed .regime-word{color:var(--green)}
.regime-bar.calm .regime-word{color:var(--blue)}
.regime-bar.chaos .regime-word{color:var(--yellow)}
.regime-data{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
.main-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:16px}
.play-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px}
.play-regime{font-size:.85rem;color:var(--blue);margin-bottom:4px}
.play-strategy{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;margin-bottom:16px}
.conviction-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.conviction-bar{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.conviction-fill{height:100%;border-radius:4px;transition:width .5s}
.conviction-fill.high{background:var(--green)}
.conviction-fill.moderate{background:var(--yellow)}
.conviction-fill.low{background:var(--red)}
.conviction-label{font-size:.75rem;font-weight:700;font-family:var(--mono);min-width:90px;text-align:right}
.conviction-label.high{color:var(--green)}
.conviction-label.moderate{color:var(--yellow)}
.conviction-label.low{color:var(--red)}
.legs{margin:16px 0;padding:14px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border)}
.leg{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-family:var(--mono);font-size:.85rem}
.leg .action{font-weight:700;width:40px}
.leg .action.buy{color:var(--green)}
.leg .action.sell{color:var(--red)}
.leg .contract{color:var(--text)}
.leg .price{color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden;margin:16px 0}
.metric{background:var(--card);padding:14px;text-align:center}
.metric .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.metric .value{font-size:1.1rem;font-weight:700;font-family:var(--mono)}
.metric .value.green{color:var(--green)}
.metric .value.red{color:var(--red)}
.why{font-size:.82rem;color:var(--muted);line-height:1.6;padding:14px;background:rgba(59,130,246,.04);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;margin:16px 0}
.size-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:700;margin-bottom:16px}
.size-badge.full{background:rgba(16,185,129,.15);color:var(--green)}
.size-badge.reduced{background:rgba(234,179,8,.15);color:var(--yellow)}
.size-badge.minimum{background:rgba(239,68,68,.15);color:var(--red)}
.actions{display:grid;grid-template-columns:3fr 1fr;gap:10px;margin-top:20px}
.btn{padding:16px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.btn-execute{background:var(--green);color:#000}
.btn-execute:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(16,185,129,.3)}
.btn-execute:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-pass{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-pass:hover{border-color:var(--muted)}
.track-record{padding:12px 20px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--border);font-family:var(--mono);font-size:.72rem;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.track-record .stat{display:flex;gap:4px}
.track-record .stat .val{color:var(--text);font-weight:600}
.no-signal{text-align:center;padding:60px 20px}
.no-signal p{color:var(--muted);margin:8px 0}
.generate-btn{background:var(--blue);color:#fff;border:none;padding:14px 28px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:16px}
.generate-btn:hover{opacity:.9}
.filters-row{display:flex;gap:4px;margin:12px 0;flex-wrap:wrap}
.filter-dot{width:8px;height:8px;border-radius:50%}
.filter-dot.pass{background:var(--green)}
.filter-dot.fail{background:var(--red)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Options<span>Tycoon</span></div>
    <div class="time" id="timeDisplay"></div>
  </div>
  <div id="content"><div class="no-signal"><p>Loading...</p></div></div>
  <div class="track-record" id="trackRecord" style="margin-top:16px">
    <div class="stat">Capital: <span class="val" id="trCapital">--</span></div>
    <div class="stat">Risk/Trade: <span class="val" id="trRiskTrade">--</span></div>
    <div class="stat">Today's Risk Used: <span class="val" id="trDailyRisk">--</span></div>
  </div>
  <div class="track-record" style="margin-top:8px">
    <div class="stat">Trades: <span class="val" id="trTotal">0</span>/30</div>
    <div class="stat">Win Rate: <span class="val" id="trWinRate">--</span></div>
    <div class="stat">P&L: <span class="val" id="trPnl">--</span></div>
    <div class="stat">To Go Live: <span class="val" id="trRemaining">30 more</span></div>
  </div>
  <div class="track-record" style="margin-top:8px">
    <div class="stat">Gates Passed: <span class="val" id="trGates">0/7</span></div>
    <div class="stat">Status: <span class="val" id="trLockStatus" style="color:var(--red)">LOCKED</span></div>
    <div class="stat">Streak: <span class="val" id="trStreak">--</span></div>
    <div class="stat">Drawdown: <span class="val" id="trDrawdown">--</span></div>
  </div>
  <div id="gateDetails" style="margin-top:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:.72rem"></div>
</div>
<script>
(function(){
'use strict';
document.getElementById('timeDisplay').textContent=new Date().toLocaleString('en-US',{weekday:'short',hour:'2-digit',minute:'2-digit',timeZoneName:'short'});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getRegime(data){
  if(!data)return{word:'LOADING',cls:'calm'};
  var vix=data.vix?data.vix.change_pct:0;
  var us=data.sp500?data.sp500.change_pct:0;
  if(vix>10||us<-1.5)return{word:'FEAR',cls:'fear'};
  if(vix<-5||us>1)return{word:'GREED',cls:'greed'};
  if(vix>5||us<-0.5)return{word:'CAUTION',cls:'chaos'};
  return{word:'CALM',cls:'calm'};
}

function render(card){
  if(!card||card.action==='skip'){
    var reason=card?card.reason:'No signal generated yet';
    var failed=card?card.failed_reasons||[]:[]; 
    var html='<div class="no-signal"><p style="font-size:1.1rem;font-weight:600">No Edge Today</p><p>'+esc(reason)+'</p>';
    if(failed.length>0){
      html+='<div style="text-align:left;margin:16px auto;max-width:400px">';
      for(var i=0;i<failed.length;i++) html+='<p style="font-size:.72rem;color:var(--muted);padding:2px 0">'+esc(failed[i])+'</p>';
      html+='</div>';
    }
    html+='<button class="generate-btn" onclick="generateSignal()">Generate Signal</button></div>';
    document.getElementById('content').innerHTML=html;
    return;
  }
  var t=card.trade||{};
  var c=card.conditions||{};
  var qf=card.quality_filters||{};
  var ps=card.position_sizing||qf.position_sizing||{};
  var data=(card.pattern_result||{}).conditions||c;
  var regime=getRegime(card._global_data||{data:c});

  // Regime bar
  var us=c.us_change_pct||0;
  var vix=c.vix_change_pct||0;
  var dxy=c.dxy_change_pct||0;
  if(vix>10||us<-1.5) regime={word:'FEAR',cls:'fear'};
  else if(vix<-5||us>1) regime={word:'GREED',cls:'greed'};
  else if(vix>5||us<-0.5) regime={word:'CAUTION',cls:'chaos'};
  else regime={word:'CALM',cls:'calm'};

  var html='';
  html+='<div class="regime-bar '+regime.cls+'">';
  html+='<span class="regime-word">'+regime.word+'</span>';
  html+='<span class="regime-data">US '+us.toFixed(1)+'% | VIX '+vix.toFixed(1)+'% | DXY '+dxy.toFixed(1)+'%</span>';
  html+='</div>';

  // Main card
  html+='<div class="main-card">';
  html+='<div class="play-label">TODAY\'S PLAY</div>';
  html+='<div class="play-regime">'+esc(card.direction||'').toUpperCase()+' — '+(card.direction==='bullish'?'Bounce expected':'Downside expected')+'</div>';
  html+='<div class="play-strategy">'+(t.type||'').replace(/_/g,' ').toUpperCase()+'</div>';

  // Conviction bar
  var conf=card.confidence||0;
  var confCls=conf>=70?'high':conf>=55?'moderate':'low';
  var filtersP=qf.passed||0;
  html+='<div class="conviction-row">';
  html+='<div class="conviction-bar"><div class="conviction-fill '+confCls+'" style="width:'+conf+'%"></div></div>';
  html+='<div class="conviction-label '+confCls+'">'+conf+'% ('+filtersP+'/7)</div>';
  html+='</div>';

  // Filter dots + details
  var filters=qf.filters||{};
  html+='<div style="margin:12px 0;padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px">';
  html+='<div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">7 QUALITY FILTERS</div>';
  for(var k in filters){
    var f=filters[k];
    var icon=f.pass?'<span style="color:var(--green)">PASS</span>':'<span style="color:var(--red)">FAIL</span>';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.75rem;border-bottom:1px solid var(--border)">';
    html+='<span style="color:var(--muted)">'+esc(f.name)+'</span>';
    html+='<span>'+icon+'</span>';
    html+='</div>';
  }
  html+='</div>';

  // Position size badge
  var sizeLabel=ps.label||'';
  var sizeCls=ps.size==='full'?'full':ps.size==='reduced'?'reduced':'minimum';
  if(sizeLabel) html+='<div class="size-badge '+sizeCls+'">'+esc(sizeLabel)+'</div>';

  // Legs
  var legs=t.legs||[];
  if(legs.length>0){
    html+='<div class="legs">';
    for(var i=0;i<legs.length;i++){
      var leg=legs[i];
      var aCls=leg.action==='BUY'?'buy':'sell';
      html+='<div class="leg"><span class="action '+aCls+'">'+leg.action+'</span><span class="contract">NIFTY '+leg.strike+' '+leg.option+'</span><span class="price">Rs.'+leg.premium_est+'</span></div>';
    }
    html+='</div>';
  }

  // Metrics
  html+='<div class="metrics">';
  html+='<div class="metric"><div class="label">Risk</div><div class="value red">Rs.'+(t.max_loss||0)+'</div></div>';
  html+='<div class="metric"><div class="label">Reward</div><div class="value green">Rs.'+(t.max_profit||0)+'</div></div>';
  html+='<div class="metric"><div class="label">R:R</div><div class="value">'+(t.risk_reward||0)+':1</div></div>';
  html+='</div>';

  // Why
  html+='<div class="why">'+esc(card.reasoning||'')+'</div>';

  // Actions
  html+='<div class="actions" style="grid-template-columns:1fr 2fr 1fr">';
  html+='<button class="btn btn-pass" onclick="loginKite()" style="font-size:.8rem">ZERODHA</button>';
  html+='<button class="btn btn-execute" onclick="executeTrade()">EXECUTE</button>';
  html+='<button class="btn btn-pass" onclick="passTrade()">PASS</button>';
  html+='</div>';
  html+='</div>';

  // Stock signals
  var stocks=card.stock_signals||[];
  if(stocks.length>0){
    html+='<div style="margin-top:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px">';
    html+='<div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px">STOCK SIGNALS ('+stocks.length+')</div>';
    for(var j=0;j<stocks.length;j++){
      var s=stocks[j];
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">';
      html+='<span style="font-weight:600;font-size:.85rem">'+esc(s.name)+'</span>';
      html+='<span style="font-size:.7rem;font-weight:700;color:'+(s.direction==='bullish'?'var(--green)':'var(--red)')+'">'+s.direction.toUpperCase()+' '+s.confidence+'%</span>';
      html+='</div>';
      if(s.catalyst&&s.catalyst.has_catalyst) html+='<div style="font-size:.68rem;color:var(--yellow);padding:2px 0">'+esc(s.catalyst.description)+'</div>';
    }
    html+='</div>';
  }

  document.getElementById('content').innerHTML=html;
}

window.generateSignal=function(){
  document.getElementById('content').innerHTML='<div class="no-signal"><p>Generating signal...</p><p style="font-size:.75rem;color:var(--muted)">Fetching global data + running pattern match (15-30s)</p></div>';
  fetch('/api/live/generate-signal',{method:'POST'}).then(function(r){return r.json();}).then(function(d){
    if(d.success) fetch('/api/live/signal').then(function(r){return r.json();}).then(render);
    else document.getElementById('content').innerHTML='<div class="no-signal"><p>Failed: '+(d.error||'Unknown')+'</p><button class="generate-btn" onclick="generateSignal()">Retry</button></div>';
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="no-signal"><p>Error: '+e+'</p><button class="generate-btn" onclick="generateSignal()">Retry</button></div>';
  });
};

window.loginKite=function(){
  alert('Kite Connect not activated yet. Once subscribed, this will redirect to Zerodha login for live trading.');
};

window.executeTrade=function(){
  if(!confirm('Paper Execute this trade?'))return;
  fetch('/api/live/paper-execute',{method:'POST'}).then(function(r){return r.json();}).then(function(d){
    if(d.success) alert('Trade logged. Check EOD for results.');
    else alert('Error: '+(d.error||'Unknown'));
  });
};

window.passTrade=function(){
  document.getElementById('content').innerHTML='<div class="no-signal"><p style="font-weight:600">Passed.</p><p style="font-size:.8rem;color:var(--muted)">No trade taken today. Capital preserved.</p></div>';
};

// Load
fetch('/api/live/signal').then(function(r){
  if(r.status===404) return null;
  return r.json();
}).then(function(d){
  if(d) render(d);
  else document.getElementById('content').innerHTML='<div class="no-signal"><p>No signal yet</p><button class="generate-btn" onclick="generateSignal()">Generate Today\'s Signal</button></div>';
}).catch(function(){
  document.getElementById('content').innerHTML='<div class="no-signal"><p>No signal yet</p><button class="generate-btn" onclick="generateSignal()">Generate Today\'s Signal</button></div>';
});

// Track record
fetch('/api/live/gate-status').then(function(r){return r.json();}).then(function(g){
  var md=g.metrics_detail||{};
  var total=g.total_trades||0;
  var remaining=Math.max(0,30-total);
  document.getElementById('trTotal').textContent=total;
  document.getElementById('trWinRate').textContent=md.win_rate||'--';
  document.getElementById('trPnl').textContent=md.expectancy||'--';
  document.getElementById('trRemaining').textContent=remaining>0?remaining+' more':'READY';
  document.getElementById('trRemaining').style.color=remaining>0?'var(--yellow)':'var(--green)';
  var gatesPassed=0;
  var metrics=g.metrics||{};
  for(var k in metrics){if(metrics[k])gatesPassed++;}
  document.getElementById('trGates').textContent=gatesPassed+'/7';
  document.getElementById('trGates').style.color=gatesPassed>=7?'var(--green)':gatesPassed>=5?'var(--yellow)':'var(--red)';
  document.getElementById('trLockStatus').textContent=g.locked?'LOCKED':'LIVE';
  document.getElementById('trLockStatus').style.color=g.locked?'var(--red)':'var(--green)';
  document.getElementById('trDrawdown').textContent=md.max_drawdown||'--';
  document.getElementById('trStreak').textContent=md.max_consec_losses?md.max_consec_losses+' losses':'--';
  // Gate details
  var gateHtml='<div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">UNLOCK REQUIREMENTS</div>';
  var gateItems=[
    {key:'trade_count',label:'Trades',target:'30+',val:md.trade_count||'0/30'},
    {key:'win_rate',label:'Win Rate',target:'>50%',val:md.win_rate||'--'},
    {key:'profit_factor',label:'Profit Factor',target:'>1.5',val:md.profit_factor||'--'},
    {key:'avg_win_loss',label:'Avg Win/Loss',target:'>1.0',val:md.avg_win_loss||'--'},
    {key:'max_drawdown',label:'Max Drawdown',target:'<15%',val:md.max_drawdown||'--'},
    {key:'max_consec_losses',label:'Consec Losses',target:'<5',val:md.max_consec_losses||'--'},
    {key:'expectancy',label:'Expectancy',target:'>Rs.0',val:md.expectancy||'--'}
  ];
  for(var i=0;i<gateItems.length;i++){
    var gi=gateItems[i];
    var pass=metrics[gi.key];
    var color=pass?'var(--green)':'var(--red)';
    var icon=pass?'PASS':'FAIL';
    gateHtml+='<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">';
    gateHtml+='<span style="color:var(--muted)">'+gi.label+' (need '+gi.target+')</span>';
    gateHtml+='<span style="color:'+color+';font-weight:600;font-family:var(--mono)">'+gi.val+' '+icon+'</span>';
    gateHtml+='</div>';
  }
  document.getElementById('gateDetails').innerHTML=gateHtml;
}).catch(function(){});

// Capital info
fetch('/api/live/settings').then(function(r){return r.json();}).then(function(s){
  var cap=s.capital||0;
  var riskPct=s.risk_per_trade||0.02;
  var maxRisk=cap*riskPct;
  document.getElementById('trCapital').textContent='Rs.'+cap.toLocaleString();
  document.getElementById('trRiskTrade').textContent='Rs.'+maxRisk.toLocaleString()+' ('+Math.round(riskPct*100)+'%)';
  document.getElementById('trDailyRisk').textContent='Rs.0 / Rs.'+(cap*(s.risk_per_day||0.05)).toLocaleString();
}).catch(function(){});

})();
</script>
</body>
</html>
