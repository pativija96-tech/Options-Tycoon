<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Tycoon — Something went wrong</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #050a0f; color: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
        .container { max-width: 420px; }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
        p { font-size: 0.95rem; color: #8899aa; line-height: 1.7; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 14px 28px; background: #00e676; color: #000; font-weight: 800; border-radius: 10px; text-decoration: none; font-size: 0.95rem; }
        .sub { margin-top: 20px; font-size: 0.8rem; color: #4a5b6e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">⚡</div>
        <h1>Something went wrong</h1>
        <p>We hit a temporary issue. Your data is safe. Please try again in a moment.</p>
        <a href="/" class="btn">Back to Home</a>
        <p class="sub">If this keeps happening, email us: <a href="mailto:support@options-tycoon.com" style="color:#00e676;">support@options-tycoon.com</a></p>
    </div>
</body>
</html>
